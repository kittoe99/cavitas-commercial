    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#000000',
                50:  '#f5f5f5',
                100: '#e5e5e5',
                400: '#525252',
                500: '#000000',
                600: '#171717',
                700: '#0a0a0a',
              },
              secondary: {
                DEFAULT: '#DC2626',
                50:  '#FEF2F2',
                100: '#FEE2E2',
                200: '#FECACA',
                400: '#F87171',
                500: '#EF4444',

                700: '#B91C1C',
              }
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
              display: ['"Instrument Serif"', 'Georgia', 'serif'],
              serif: ['"Instrument Serif"', 'Georgia', 'serif'],
            }
          }
        }
      };

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      :root {
        --bg: #121212;
        --bg-alt: #161616;
        --surface: #1c1c1c;
        --surface-2: #242424;
        --text: #e8e8e8;
        --text-muted: #aeb0b2;
        --border: rgba(255, 255, 255, 0.08);
        --site-header-height: 124px;
        --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
        --font-serif: 'Instrument Serif', Georgia, serif;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.015em;
      }

      h1, h2 {
        font-family: var(--font-serif);
        letter-spacing: -0.02em;
        font-weight: 400;
      }

      h3, h4, h5, h6 {
        font-family: var(--font-sans);
        letter-spacing: -0.02em;
      }

      .font-serif {
        font-family: var(--font-serif) !important;
        font-weight: 400 !important;
      }

      .font-sans {
        font-family: var(--font-sans) !important;
      }

      button {
        border-radius: 0.75rem;
      }

      .hero-section .hero-mobile-cta button {
        border-radius: 0;
      }

      input:not([type="radio"]):not([type="checkbox"]),
      select,
      textarea {
        border: 1px solid #c8c8c8;
        background-color: #f0f0f0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        color: #1a1a1a;
        color-scheme: light;
      }

      input:not([type="radio"]):not([type="checkbox"])::placeholder,
      textarea::placeholder {
        color: #6b6b6b;
        opacity: 1;
      }

      input:not([type="radio"]):not([type="checkbox"]):hover,
      select:hover,
      textarea:hover {
        border-color: #a8a8a8;
        background-color: #f5f5f5;
      }

      input:not([type="radio"]):not([type="checkbox"]):focus,
      select:focus,
      textarea:focus {
        border-color: #DC2626;
        background-color: #fafafa;
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.12);
        outline: none;
      }

      select option {
        background-color: #f5f5f5;
        color: #1a1a1a;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: var(--site-header-height, 124px);
      }

      @media (min-width: 1024px) {
        :root {
          --site-header-height: 164px;
        }
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: #3a3a3a;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4f4f4f;
      }

      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      .animate-fade-in {
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }
      .animate-slide-up {
        animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
      }
      .animate-scale-in {
        animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: scale(0.95);
      }

      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }

      .mobile-menu-enter {
        animation: slideDown 0.3s ease-out forwards;
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Hero art — quiet living motion */
      @keyframes glossSweep {
        0%, 100% { stroke-dashoffset: 420; opacity: 0.35; }
        45% { opacity: 1; }
        70% { stroke-dashoffset: 0; opacity: 0.85; }
      }
      @keyframes sparklePulse {
        0%, 100% { opacity: 0.35; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes panePulse {
        0%, 100% { fill-opacity: 0.4; }
        50% { fill-opacity: 0.7; }
      }
      @keyframes glassShine {
        0%, 100% { opacity: 0.04; }
        50% { opacity: 0.09; }
      }
      @keyframes cleanerSway {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        50% { transform: translateX(2px) rotate(0.6deg); }
      }

      @keyframes zipCheckSpin {
        to { transform: rotate(360deg); }
      }
      @keyframes zipCheckRing {
        0%, 100% { transform: scale(1); opacity: 0.55; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @keyframes zipCheckBar {
        from { width: 0%; }
        to { width: 100%; }
      }
      @keyframes zipCheckPop {
        from { transform: scale(0.7); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes zipCheckPanelIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .zip-check-spin {
        animation: zipCheckSpin 0.9s linear infinite;
      }
      .zip-check-ring {
        animation: zipCheckRing 1.6s ease-in-out infinite;
      }
      .zip-check-bar {
        animation: zipCheckBar 1.5s linear forwards;
      }
      .zip-check-pop {
        animation: zipCheckPop 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .zip-check-panel {
        animation: zipCheckPanelIn 0.3s ease-out both;
      }

      @media (prefers-reduced-motion: reduce) {
        .zip-check-spin,
        .zip-check-ring,
        .zip-check-bar,
        .zip-check-pop,
        .zip-check-panel {
          animation: none !important;
        }
        .zip-check-bar {
          width: 100%;
        }
      }

      .hero-gloss {
        stroke-dasharray: 420;
        stroke-dashoffset: 420;
        animation: glossSweep 5.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .hero-sparkle {
        transform-box: fill-box;
        transform-origin: center;
        animation: sparklePulse 2.8s ease-in-out infinite;
      }
      .hero-sparkle-delay {
        transform-box: fill-box;
        transform-origin: center;
        animation: sparklePulse 2.8s ease-in-out 0.9s infinite;
      }
      .hero-pane {
        animation: panePulse 4s ease-in-out infinite;
      }
      .hero-pane-delay {
        animation: panePulse 4s ease-in-out 1.2s infinite;
      }
      .hero-glass-shine {
        animation: glassShine 4.5s ease-in-out infinite;
      }
      .hero-cleaner {
        transform-box: fill-box;
        transform-origin: center bottom;
        animation: cleanerSway 5s ease-in-out infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        .hero-gloss,
        .hero-sparkle,
        .hero-sparkle-delay,
        .hero-pane,
        .hero-pane-delay,
        .hero-glass-shine,
        .hero-cleaner {
          animation: none !important;
        }
      }
    </style>
  </head>

    <div id="root"></div>
